name: Update Changelog in Docs

on:
  release:
    types: [published]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Changelog File
        run: |
          # Maak een tijdelijk bestand met de nieuwe release info
          echo "### ${{ github.event.release.tag_name }} ($(date +'%Y-%m-%d'))" > new_entry.txt
          echo "${{ github.event.release.body }}" >> new_entry.txt
          echo -e "\n---\n" >> new_entry.txt
          
          # Zoek de plek na de header (regel 7 in dit voorbeeld) en voeg de nieuwe tekst in
          # We plakken de nieuwe entry direct na de frontmatter/titel
          sed -i '8r new_entry.txt' docs/changelog.md

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/changelog.md
          git commit -m "docs: automatische changelog update voor ${{ github.event.release.tag_name }}"
          git push
